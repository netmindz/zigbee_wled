; PlatformIO Project Configuration
; Zigbee DMX Bridge - ESP32-C6
; Presents configurable RGB/RGBW lights as Zigbee HA Color Dimmable Lights
; (Hue-compatible) and outputs via DMX512.

[env:esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
platform_packages =
board = esp32-c6-devkitc-1
framework = arduino
board_build.partitions = partitions/zigbee_dmx_8MB.csv
board_build.filesystem = littlefs

monitor_speed = 115200

; --- Dependencies ---
lib_deps =
  bblanchon/ArduinoJson@^7.0.0

; --- Build flags ---
build_flags =
  -DZIGBEE_MODE_ED=1
  -DCORE_DEBUG_LEVEL=3
  -DCONFIG_ZB_ENABLED=1
  -DBOARD_HAS_PSRAM=0
  ; DMX TX pin - GPIO2 by default, override as needed
  -DDMX_TX_PIN=2
  ; DMX RX pin (not used for output-only, but required by library)
  -DDMX_RX_PIN=3
  ; DMX enable pin for RS-485 transceiver (set HIGH for TX)
  -DDMX_EN_PIN=4
  ; Maximum number of configurable lights
  -DMAX_LIGHTS=16
  ; Zigbee endpoints start at 10 (endpoint N = 10 + light_index)
  -DZIGBEE_ENDPOINT_BASE=10
  ; Zigbee task config
  -DZIGBEE_TASK_STACK_SIZE=16384
  -DZIGBEE_TASK_PRIORITY=5

build_unflags =
  -DCORE_DEBUG_LEVEL=0
  -D CORE_DEBUG_LEVEL=0
